<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Watch Effective Size Calculator</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23f4f4f4' stroke='%23333' stroke-widt[...]"/>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0;padding:40px}
.container{max-width:560px;margin:auto;background:#fff;padding:28px;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.15)}
label{display:block;margin-top:16px;font-weight:bold}
.row{display:flex;gap:10px}
.row input{flex:1}
.row select{width:110px}
input,select,button{padding:10px;font-size:16px;box-sizing:border-box}
input,select{width:100%}
.toggle-container{display:flex;align-items:center;gap:12px;margin-top:10px}
.toggle-switch{position:relative;display:inline-block;width:50px;height:28px}
.toggle-switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#ccc;transition:.3s;border-radius:28px}
.slider:before{position:absolute;content:"";height:22px;width:22px;left:3px;bottom:3px;background-color:#fff;transition:.3s;border-radius:50%}
input:checked+.slider{background-color:#0969da}
input:checked+.slider:before{transform:translateX(22px)}
.result{margin-top:24px;background:#eef5ff;padding:20px;border-radius:10px;text-align:center}
.size{font-size:42px;font-weight:bold;color:#1f6feb}
.note,.explanation{margin-top:14px;color:#555;line-height:1.5}
button{margin-top:10px;width:100%}

/* Section styling */
.section{background:#fbfcfe;border:1px solid #e9eef8;padding:14px;border-radius:10px;margin-bottom:14px}
.section h3{margin:0 0 8px 0;font-size:16px;color:#0f1724}
</style>
</head>
<body>
<div class="container">
<h2>Watch Effective Size Calculator</h2>
<p>More details and the methodology for this calculator are available in the project repository: <a href="https://github.com/heffergm/watch-sizing" target="_blank" rel="noopener noreferrer">heffergm/watch-sizing</a>.</p>

<div class="section" style="margin-bottom:14px">
  <h3 style="margin:0 0 8px 0;font-size:16px">Wrist Details</h3>
  <label>Wrist Size</label>
  <div class="row">
    <input id="wrist" type="number" step="0.1" value="6.75" oninput="calculate()">
    <select id="unit" onchange="changeUnit()">
      <option value="in" selected>in</option>
      <option value="mm">mm</option>
    </select>
  </div>

  <label>Wrist Shape</label>
  <select id="wristShape" onchange="calculate()">
    <option value="neutral">Neutral</option>
    <option value="round">Round</option>
    <option value="flat">Flat</option>
  </select>
</div>

<div class="section" style="margin-bottom:14px">
  <h3 style="margin:0 0 8px 0;font-size:16px">Watch Details</h3>
  <label>Watch Diameter (mm)</label>
  <input id="diameter" type="number" step="0.1" value="40" oninput="calculate()">

  <label>Lug-to-Lug (mm)</label>
  <input id="lug" type="number" step="0.1" placeholder="e.g., 47" oninput="calculate()">

  <label>Case Type</label>
  <select id="caseType" onchange="calculate()">
    <option value="round">Round</option>
    <option value="square">Square (+1.5 mm)</option>
    <option value="tonneau">Tonneau (+1.5 mm)</option>
  </select>

  <label>Integrated Bracelet?</label>
  <div class="toggle-container">
    <label class="toggle-switch">
      <input type="checkbox" id="integrated" onchange="calculate()">
      <span class="slider"></span>
    </label>
    <span style="font-weight:normal">Yes</span>
  </div>
</div>

<div class="result">
  <div><h2>Effective Visual Size</h2></div>
<div id="output" class="size"></div>
<div id="fitCategory" style="font-size:18px;color:#333;margin-top:6px"></div>
<div id="explanation" class="explanation"></div>
<div style="margin-top:20px;padding-top:20px;border-top:1px solid #ddd">
<div style="font-size:14px;color:#666;margin-bottom:8px;font-weight:bold">Your Maximum Lug-to-Lug</div>
<div id="maxLugToLugDisplay" style="font-size:24px;font-weight:bold;color:#0969da"></div>
<div id="lugExplanation" style="font-size:12px;color:#999;margin-top:8px"><i>Calculated as wrist circumference ÷ π − comfort allowance</i></div>
</div>
</div>
</div>

<script>
const CASE_ADJUSTMENTS={round:0,square:1.5,tonneau:1.5};
const WRIST_SHAPE_ADJUSTMENTS={neutral:0,round:0.5,flat:-0.5};
const WRIST_SHAPE_LUG_ADJUSTMENTS={neutral:0,round:-1.5,flat:1.5};
const WRIST_SHAPE_COMFORT={neutral:-4,round:-5,flat:-3};

function wristInches(){
 let v=parseFloat(document.getElementById("wrist").value)||0;
 return document.getElementById("unit").value==="mm"?v/25.4:v;
}
function calculateAdjustmentMultiplier(wristIn){
 const baseline=6.75;
 const deviation=Math.abs(wristIn-baseline);
  
 const mult=1.0/(1.0+0.25*deviation*deviation);
 return Math.max(0.731,mult);
}
function calculateComfortMultiplier(wristIn){
 const baseline=6.75;
 const deviation=Math.abs(wristIn-baseline);
  
 return 1.0/(1.0+0.25*deviation*deviation);
}
function calculate(){
 const wristIn=wristInches();
 
 if(wristIn<4||wristIn>9){
   document.getElementById("output").textContent="Invalid wrist size";
   document.getElementById("explanation").innerHTML="Wrist circumference must be between 4 and 9 inches.";
   document.getElementById("maxLugToLugDisplay").textContent="–";
   document.getElementById('fitCategory').textContent='';
   return;
 }
 
 const raw=document.getElementById("wrist").value;
 const unit=document.getElementById("unit").value;
 const d=parseFloat(document.getElementById("diameter").value)||0;
 const c=document.getElementById("caseType").value;
 const s=document.getElementById("wristShape").value;
 const integrated=document.getElementById("integrated").checked;
   
 let braceletAdj=0;
 if(integrated){
   braceletAdj=c==="round"?1:0.5;
 }
   
 const multiplier=calculateAdjustmentMultiplier(wristIn);
 const eff=d+(6.75-wristIn)*4*multiplier+CASE_ADJUSTMENTS[c]+braceletAdj+WRIST_SHAPE_ADJUSTMENTS[s];
 document.getElementById("output").textContent=eff.toFixed(1)+" mm";
 // determine fit category
 let fit='';
 if(eff<=36) fit='Fit: Classic';
 else if(eff>36 && eff<=40) fit='Fit: Modern Standard';
 else if(eff>40 && eff<=44) fit='Fit: Modern Large';
 else if(eff>44) fit='Fit: Oversize';
 document.getElementById('fitCategory').textContent=fit;

 document.getElementById("explanation").innerHTML=
 `A <b>${d.toFixed(1)} mm ${c}</b> watch on a <b>${raw} ${unit}</b> ${s} wrist${integrated?' with integrated bracelet':''} has approximately the visual presence of a <b>${eff.toFixed(1)} mm round</b>`;
  
 const circumferenceIn=wristIn;
 const circumferenceMm=circumferenceIn*25.4;
 const comfortMultiplier=calculateComfortMultiplier(wristIn);
 const scaledComfort=WRIST_SHAPE_COMFORT[s]*comfortMultiplier;
 const comfortAllowance=-scaledComfort;
 const maxLugToLug=circumferenceMm/Math.PI+scaledComfort+WRIST_SHAPE_LUG_ADJUSTMENTS[s];
 document.getElementById("maxLugToLugDisplay").textContent=maxLugToLug.toFixed(1)+" mm";
  
 // handle user-entered lug-to-lug comparison
 const enteredLugRaw=document.getElementById("lug").value;
 const enteredLug=parseFloat(enteredLugRaw);
 const maxDisplay=document.getElementById("maxLugToLugDisplay");
 if(!isNaN(enteredLug) && enteredLug>maxLugToLug){
   maxDisplay.style.color='red';
 }else{
   maxDisplay.style.color='#0969da';
 }
  
 document.getElementById("lugExplanation").innerHTML=`<i>Calculated as wrist circumference ÷ π − ${comfortAllowance.toFixed(1)}mm (${s} wrist comfort allowance) + ${WRIST_SHAPE_LUG_ADJUSTMENTS[s]} mm wrist shape adjustment</i>`;
     
 updateURL(raw,unit,d,c,integrated?'true':'false',s,enteredLugRaw);
}
function updateURL(w,u,s,c,i,shape,lug){
 const p=new URLSearchParams({wrist_circumference:w,unit:u,watch_diameter:s,watch_case_type:c,watch_integrated_bracelet:i,wrist_shape:shape||'neutral',watch_lug2lug:lug||''});
 history.replaceState({},'',location.pathname+'?'+p.toString());
}
function loadURL(){
 const p=new URLSearchParams(location.search);
 if(p.get("wrist_circumference")) wrist.value=p.get("wrist_circumference");
 if(p.get("wrist")) wrist.value=p.get("wrist");
 if(p.get("unit")) unit.value=p.get("unit");
 if(p.get("watch_diameter")) diameter.value=p.get("watch_diameter");
 if(p.get("size")) diameter.value=p.get("size");
 if(p.get("watch_lug2lug")) document.getElementById("lug").value=p.get("watch_lug2lug");
 if(p.get("lug")) document.getElementById("lug").value=p.get("lug");
 if(["round","square","tonneau"].includes(p.get("watch_case_type"))) caseType.value=p.get("watch_case_type");
 if(["round","square","tonneau"].includes(p.get("case"))) caseType.value=p.get("case");
 if(["neutral","round","flat"].includes(p.get("wrist_shape"))) document.getElementById("wristShape").value=p.get("wrist_shape");
 if(["neutral","round","flat"].includes(p.get("shape"))) document.getElementById("wristShape").value=p.get("shape");
 if(p.get("watch_integrated_bracelet")==="true") document.getElementById("integrated").checked=true;
 if(p.get("watch_integrated_bracelet")==="false") document.getElementById("integrated").checked=false;
 if(p.get("integrated")==="yes") document.getElementById("integrated").checked=true;
 calculate();
}
function changeUnit(){
 const input=document.getElementById("wrist");
 const old=input.value;
 if(old==="") return;
 let v=parseFloat(old);
 if(document.getElementById("unit").value==="mm"){
   input.value=(v*25.4).toFixed(1);
 }else{
   input.value=(v/25.4).toFixed(0);
 }
 calculate();
}
function copyLink(){
 navigator.clipboard.writeText(document.getElementById("shareLink").value);
 alert("Link copied.");
}
loadURL();
</script>
</body>
</html>
